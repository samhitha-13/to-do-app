<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow | Todo Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">FF</div>
            <div class="nav-icons">
                <span>📅</span>
                <span>📈</span>
                <span>⚙️</span>
            </div>
        </nav>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header>
                <h1>My Dashboard</h1>
                <div class="input-section">
                    <input type="text" id="task-input" placeholder="What's the plan, Sam?">
                    <button id="add-btn">Add Task</button>
                </div>
            </header>

            <section class="content-grid">
                <!-- Daily Tasks Column -->
                <div class="glass-panel daily-tasks">
                    <h2>Daily Tasks</h2>
                    <ul id="task-list">
                        <!-- Tasks will appear here -->
                    </ul>
                </div>

                <!-- Monthly Planning Grid -->
                <div class="glass-panel monthly-grid">
                    <h2>Monthly View</h2>
                    <div class="calendar-placeholder">
                        <!-- We'll build the grid layout here -->
                        <p>Calendar Grid Coming Soon...</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
